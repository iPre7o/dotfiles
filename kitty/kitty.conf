# =============================================================================
# TEMA KITTY - GABRYEL (BLACK & GREY)
# =============================================================================

# --- CORES PRINCIPAIS ---
# Fundo preto absoluto igual à sua Waybar
background            #000000
# Texto em cinza claro para não cansar a vista
foreground            #e0e0e0
# Cor do cursor igual à borda ativa da janela
cursor                #e0e0e0
cursor_text_color     #000000

# --- SELEÇÃO ---
# Cor da seleção igual às pílulas da Waybar (#262626)
selection_background  #262626
selection_foreground  #ffffff

# --- JANELA E BORDAS ---
window_padding_width  10
# Arredondamento (Kitty usa isso se não estiver em modo tiling total)
# Mas no Hyprland, o rounding de 12 que colocamos já resolve.

# --- CORES DO TERMINAL (ANSI) ---
# Black
color0 #1a1a1a
color8 #262626

# Red (Para erros, combinando com o hover do botão de power)
color1 #ff5555
color9 #ff6e6e

# Green
color2  #50fa7b
color10 #69ff94

# Yellow
color3  #f1fa8c
color11 #ffffa5

# Blue
color4  #bd93f9
color12 #d6acff

# Magenta
color5  #ff79c6
color13 #ff92df

# Cyan
color6  #8be9fd
color14 #a4ffff

# White
color7  #bfbfbf
color15 #ffffff

# --- FONTE ---
# Como você usa a JetBrainsMono na Waybar, recomendo manter aqui
font_family      JetBrainsMono Nerd Font
font_size        12.0
font_size        12.0

# --- OPACIDADE E BLUR ---
# 0.85 é um valor equilibrado: mantém o preto profundo mas permite o blur
background_opacity 0.85

# Define a intensidade do blur interno do Kitty
background_blur    1